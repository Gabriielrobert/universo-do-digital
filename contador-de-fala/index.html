<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>SpeechTimer AI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
--bg:#f6f8fb;
--card:#ffffff;
--text:#111;
--muted:#666;
--accent:#6366f1;
}

.dark{
--bg:#0f172a;
--card:#1e293b;
--text:#f1f5f9;
--muted:#94a3b8;
--accent:#8b5cf6;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:Inter,sans-serif;
background:var(--bg);
color:var(--text);
padding:30px;
}

.app{
max-width:1200px;
margin:auto;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.logo{
font-size:22px;
font-weight:700;
}

.controls{
display:flex;
gap:10px;
}

button{
border:none;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
background:var(--accent);
color:white;
font-weight:500;
}

.layout{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
}

.editor{
background:var(--card);
border-radius:12px;
padding:20px;
}

textarea{
width:100%;
height:420px;
border:none;
outline:none;
resize:none;
font-family:Inter;
font-size:16px;
line-height:1.6;
background:transparent;
color:var(--text);
}

.sidebar{
display:flex;
flex-direction:column;
gap:15px;
}

.card{
background:var(--card);
border-radius:12px;
padding:18px;
}

.title{
font-size:13px;
color:var(--muted);
margin-bottom:6px;
}

.value{
font-size:24px;
font-weight:700;
}

select{
width:100%;
margin-top:6px;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

.progress{
margin-top:10px;
height:8px;
background:#ddd;
border-radius:10px;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#6366f1,#8b5cf6);
}

.teleprompter{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
color:white;
display:none;
justify-content:center;
align-items:center;
padding:80px;
font-size:38px;
line-height:1.5;
overflow:hidden;
}

.teleprompter-text{
max-width:900px;
}

.timer{
font-size:20px;
margin-top:8px;
}

</style>
</head>

<body>

<div class="app">

<div class="header">
<div class="logo">SpeechTimer AI</div>

<div class="controls">
<button onclick="toggleDark()">Dark</button>
<button onclick="exportar()">Exportar</button>
<button onclick="abrirTeleprompter()">Teleprompter</button>
</div>

</div>

<div class="layout">

<div class="editor">
<textarea id="texto" placeholder="Digite ou cole seu roteiro aqui..."></textarea>
</div>

<div class="sidebar">

<div class="card">
<div class="title">Palavras</div>
<div class="value" id="palavras">0</div>
</div>

<div class="card">
<div class="title">Caracteres</div>
<div class="value" id="caracteres">0</div>
</div>

<div class="card">
<div class="title">Tempo estimado</div>
<div class="value" id="tempo">0s</div>
<div class="timer" id="gravacao">⏺ 00:00</div>
</div>

<div class="card">
<div class="title">Velocidade de fala</div>

<select id="velocidade">
<option value="120">Lenta</option>
<option value="150" selected>Normal</option>
<option value="180">Rápida</option>
<option value="200">Apresentação</option>
</select>

</div>

<div class="card">

<div class="title">Duração vídeo</div>

<div class="progress">
<div class="bar" id="barra"></div>
</div>

</div>

<button onclick="startTimer()">Iniciar gravação</button>

</div>

</div>

</div>

<div class="teleprompter" id="teleprompter">
<div class="teleprompter-text" id="tptexto"></div>
</div>

<script>

const texto=document.getElementById("texto")
const velocidade=document.getElementById("velocidade")

texto.addEventListener("input",calcular)
velocidade.addEventListener("change",calcular)

function calcular(){

let conteudo=texto.value.trim()

let palavras=conteudo.split(/\s+/).filter(Boolean).length
let caracteres=conteudo.length

document.getElementById("palavras").innerText=palavras
document.getElementById("caracteres").innerText=caracteres

let ppm=parseInt(velocidade.value)

let minutos=palavras/ppm
let segundosTotal=Math.round(minutos*60)

let min=Math.floor(segundosTotal/60)
let seg=segundosTotal%60

let tempo=min>0?min+"m "+seg+"s":seg+"s"

document.getElementById("tempo").innerText=tempo

let porcentagem=(segundosTotal/60)*100
if(porcentagem>100)porcentagem=100

document.getElementById("barra").style.width=porcentagem+"%"

}

function toggleDark(){
document.body.classList.toggle("dark")
}

function exportar(){

let text=texto.value
let blob=new Blob([text],{type:"text/plain"})
let a=document.createElement("a")

a.href=URL.createObjectURL(blob)
a.download="roteiro.txt"
a.click()

}

let tempo=0
let intervalo

function startTimer(){

clearInterval(intervalo)

intervalo=setInterval(()=>{

tempo++

let m=Math.floor(tempo/60)
let s=tempo%60

if(s<10)s="0"+s

document.getElementById("gravacao").innerText="⏺ "+m+":"+s

},1000)

}

function abrirTeleprompter(){

let tp=document.getElementById("teleprompter")
let txt=document.getElementById("tptexto")

txt.innerText=texto.value

tp.style.display="flex"

let pos=0

setInterval(()=>{

pos+=0.3

txt.style.transform="translateY(-"+pos+"px)"

},30)

tp.onclick=()=>{

tp.style.display="none"

}

}

</script>

</body>
</html>
